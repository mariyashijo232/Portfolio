  <script type="text/babel">
    const { useState, useEffect } = React;

    // Hook: track whether the viewport is "mobile" sized.
    function useIsMobile(breakpoint = 768) {
      const [isMobile, setIsMobile] = useState(
        typeof window !== 'undefined' ? window.innerWidth <= breakpoint : false
      );
      useEffect(() => {
        const onResize = () => setIsMobile(window.innerWidth <= breakpoint);
        window.addEventListener('resize', onResize);
        return () => window.removeEventListener('resize', onResize);
      }, [breakpoint]);
      return isMobile;
    }

    // Hook: read the project slug from location.hash (#/<slug>) and keep
    // it in sync as the user navigates within the app.
    function useHashRoute() {
      const parse = () => {
        const h = window.location.hash || '';
        const m = h.match(/^#\/?([a-z0-9-]+)/i);
        return m ? m[1] : null;
      };
      const [slug, setSlug] = useState(parse());
      useEffect(() => {
        const onHashChange = () => setSlug(parse());
        window.addEventListener('hashchange', onHashChange);
        return () => window.removeEventListener('hashchange', onHashChange);
      }, []);
      const navigate = (next) => {
        if (next) window.location.hash = '#/' + next;
        else if (window.location.hash) {
          // Strip the hash without scrolling.
          history.replaceState(null, '', window.location.pathname + window.location.search);
          setSlug(null);
        }
      };
      return [slug, navigate];
    }

    function App() {
      const tweaks = window.TWEAK_DEFAULTS;
      const isMobile = useIsMobile();
      const [slug, setSlug] = useHashRoute();

      // Re-mount when slug changes from outside (back/forward) so the
      // component's internal page state resets to the new initial.
      return (
        <DirectionKinetic
          key={slug || 'landing'}
          tweaks={tweaks}
          initialPage={slug}
          layout={isMobile ? 'mobile' : 'desktop'}
          onNavigate={setSlug}
        />
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
